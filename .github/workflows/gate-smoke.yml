# Swirl-gate smoke under llvmpipe (A4-2 groundwork).
#
# workflow_dispatch ONLY — deliberately no push/schedule triggers: llvmpipe
# runtime for a 1024-grid 700-step vorticity develop run is unmeasured and may
# be 10-50x slower than the RTX dev box (~10 s). Measure via a manual dispatch
# before anyone considers wiring this into a schedule.
#
# The gate prints the metric table and writes a labeled montage (uploaded as an
# artifact). It does not yet exit nonzero on FAIL — this job is a smoke/runtime
# probe, not an enforcement gate; enforcement waits on the W9 threshold
# re-baseline decision.

name: Gate smoke (swirl, llvmpipe)

on:
  workflow_dispatch:
  # TEMPORARY dispatch bootstrap (remove after the first runtime measurement):
  # GitHub only allows manual dispatch of workflows that exist on the DEFAULT
  # branch, so a branch-only workflow_dispatch job cannot be triggered at all.
  # This paths-scoped pull_request trigger fires only when this file itself
  # changes in a PR — i.e. exactly once, for the W9 groundwork PR — and is NOT
  # a push/schedule trigger (the job stays out of normal CI).
  pull_request:
    paths:
      - ".github/workflows/gate-smoke.yml"

jobs:
  gate-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # Software OpenGL, mirroring ci.yml (llvmpipe supports GL 4.5 + compute)
      LIBGL_ALWAYS_SOFTWARE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      # xvfb is REQUIRED, unlike in ci.yml: GpuContext.headless() goes through
      # glcontext's x11 backend, which needs a DISPLAY even for llvmpipe.
      # (In ci.yml the gpu fixture just SKIPS when XOpenDisplay fails — the
      # "GPU smoke tests (llvmpipe)" step currently runs 6 tests and skips ~178.
      # This job must actually render, so it gets a virtual display.)
      - name: Install Mesa (llvmpipe), EGL and xvfb
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1-mesa-dri libosmesa6 xvfb
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Swirl gate smoke (jupiter_vorticity ship config, 1024w)
        run: >
          xvfb-run -a uv run python scripts/swirl_gate.py --raw --preset jupiter_vorticity
          --drags 0.0 --seed 4201 --width 1024 --out out/gate-smoke
      - name: Upload montage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: swirl-gate-montage
          path: out/gate-smoke/swirl_gate.png
          if-no-files-found: warn
