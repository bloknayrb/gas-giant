name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly full GPU tier (llvmpipe is ~150x slower than native GPU; the
    # full tier measured >3 h wall on 2026-07-03, so it cannot be PR-blocking).
    - cron: "0 6 * * *"

# GL-in-CI primer (measured 2026-07-03, PR #25):
# - glcontext's x11 backend needs a DISPLAY even for software GL, so every
#   GL step runs under xvfb-run. Before PR #25 the runner had no DISPLAY,
#   GpuContext.headless() failed (XOpenDisplay), the session gpu fixture
#   skipped cleanly, and ~178/185 gpu tests silently SKIPPED while CI
#   reported green.
# - Under llvmpipe's default thread pool, vorticity/SOR output diverges
#   run-to-run by 0.06-0.53 (run 28688930797) — far past the RTX-calibrated
#   GPU_NOISE_ATOL floors — so within-run comparison tests fail for renderer
#   reasons, not bugs. LP_NUM_THREADS=1 makes llvmpipe deterministic (run
#   28689357120: same slice all-green), at ~2.7x the wall time.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Import contracts
        run: uv run lint-imports
      - name: Slider-doc drift check (text-only, no GL)
        run: uv run python scripts/render_slider_examples.py --check
      - name: Unit tests
        run: uv run pytest -m "not gpu" -q

  # PR-blocking GPU smoke: the byte-identity / no-op class — the tests the
  # testing policy ("CI is authoritative for byte-identity") actually leans
  # on. Single-threaded llvmpipe (see primer above) so the vorticity no-op
  # tests are deterministic and genuinely enforced. Measured 2026-07-03:
  # ~24 min wall (vs ~9 min threaded with 8 spurious vorticity failures).
  gpu-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      # Software OpenGL (llvmpipe supports GL 4.5 + compute)
      LIBGL_ALWAYS_SOFTWARE: "1"
      # Determinism — see primer at the top of this file.
      LP_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install Mesa (llvmpipe), EGL and xvfb
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1-mesa-dri libosmesa6 xvfb
      - name: Sync dependencies
        run: uv sync --all-extras
      # shell: bash => bash -eo pipefail, so pytest's exit code survives the
      # tee. The guard step kills the silent-skip failure mode this job was
      # created to fix: the gpu fixture skips on ANY context failure and
      # pytest exits 0 on all-skipped, so if xvfb/llvmpipe/glcontext breaks
      # in a future runner image this job would go green with zero coverage.
      # Guard = at least one test passed AND fewer than 10 skipped (healthy
      # runs have 0-1 skips; a broken GL context skips dozens — the pre-fix
      # state was "6 passed, 178 skipped", which a passed-only check misses).
      - name: GPU smoke — byte-identity/no-op class (llvmpipe, single-threaded)
        shell: bash
        run: >
          xvfb-run -a uv run pytest -m gpu
          -k "identical or noop or no_op"
          -q -rs --durations=40 | tee gpu-smoke.log
      - name: Guard — fail if the GPU tests silently skipped
        run: grep -Eq '[0-9]+ passed' gpu-smoke.log && ! grep -Eq '[0-9]{2,} skipped' gpu-smoke.log

  # Full GPU tier — non-blocking; must NOT be made a required check:
  # measured 2026-07-03 under llvmpipe at >3 h wall (146/185 tests in 180 min
  # before the job timed out; run 28683137520), so it runs on push to master,
  # nightly schedule, and manual dispatch only. Two steps:
  #  1. threaded llvmpipe for speed, with the determinism-sensitive tests
  #     deselected (they fail under threaded llvmpipe for renderer reasons —
  #     see primer; do NOT "fix" them by loosening floors);
  #  2. those same tests re-run single-threaded, where they are meaningful.
  # The deselect/rerun list = every test observed failing threaded on
  # 2026-07-03 (runs 28683137520 + 28688930797): all are vorticity-mode
  # within-run comparisons. The tail of the tier (~40 tests) has never
  # completed threaded — if the first full runs surface more such failures,
  # move them to this list rather than touching tolerances.
  gpu-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      LIBGL_ALWAYS_SOFTWARE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"
      - name: Install Mesa (llvmpipe), EGL and xvfb
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1-mesa-dri libosmesa6 xvfb
      - name: Sync dependencies
        run: uv sync --all-extras
      # shell: bash => pipefail; guard steps below fail the job if a future
      # runner-image break makes the gpu fixture skip everything again (the
      # fixture skips on ANY context failure; pytest exits 0 on all-skipped).
      - name: Full GPU tier, threaded (minus determinism-sensitive tests)
        shell: bash
        run: >
          xvfb-run -a uv run pytest -m gpu -q -rs --durations=60
          --deselect tests/gpu/test_checkpoint.py::test_mid_outbreak_checkpoint_restores_registry_exactly
          --deselect tests/gpu/test_deformation_radius.py::test_deformation_radius_off_is_noop
          --deselect tests/gpu/test_eddy_drag.py::test_eddy_drag_off_is_noop
          --deselect tests/gpu/test_hero_solid_core.py::test_solid_core_off_is_a_noop
          --deselect tests/gpu/test_m3_external_source.py::test_off_path_is_a_noop
          --deselect tests/gpu/test_m3_external_source.py::test_polar_domains_ignore_external_source
          --deselect tests/gpu/test_m3_ship.py::test_off_path_matches_plain_vorticity
          --deselect tests/gpu/test_m3_ship.py::test_preview_equals_export
          --deselect tests/gpu/test_m3_ship.py::test_seed_determinism
          --deselect tests/gpu/test_m3_ship.py::test_graceful_warmup_outcrop
          --deselect tests/gpu/test_m3_ship.py::test_restart_reuse_independent_of_prior_ticks
          --deselect tests/gpu/test_oval_solid_core.py::test_oval_solid_core_off_is_a_noop
          --deselect tests/gpu/test_per_storm_color.py::test_forced_defaults_noop_vorticity
          --deselect tests/gpu/test_psi_drag.py::test_psi_drag_off_is_noop
          --deselect tests/gpu/test_vort_inject_mask.py::test_mask_is_noop_when_inject_zero
          | tee gpu-full-threaded.log
      - name: Guard — fail if the threaded tier silently skipped
        run: grep -Eq '[0-9]+ passed' gpu-full-threaded.log && ! grep -Eq '[0-9]{2,} skipped' gpu-full-threaded.log
      - name: Determinism-sensitive tests, single-threaded
        if: always()
        shell: bash
        env:
          LP_NUM_THREADS: "1"
        run: >
          xvfb-run -a uv run pytest -q -rs --durations=20
          tests/gpu/test_checkpoint.py::test_mid_outbreak_checkpoint_restores_registry_exactly
          tests/gpu/test_deformation_radius.py::test_deformation_radius_off_is_noop
          tests/gpu/test_eddy_drag.py::test_eddy_drag_off_is_noop
          tests/gpu/test_hero_solid_core.py::test_solid_core_off_is_a_noop
          tests/gpu/test_m3_external_source.py::test_off_path_is_a_noop
          tests/gpu/test_m3_external_source.py::test_polar_domains_ignore_external_source
          tests/gpu/test_m3_ship.py::test_off_path_matches_plain_vorticity
          tests/gpu/test_m3_ship.py::test_preview_equals_export
          tests/gpu/test_m3_ship.py::test_seed_determinism
          tests/gpu/test_m3_ship.py::test_graceful_warmup_outcrop
          tests/gpu/test_m3_ship.py::test_restart_reuse_independent_of_prior_ticks
          tests/gpu/test_oval_solid_core.py::test_oval_solid_core_off_is_a_noop
          tests/gpu/test_per_storm_color.py::test_forced_defaults_noop_vorticity
          tests/gpu/test_psi_drag.py::test_psi_drag_off_is_noop
          tests/gpu/test_vort_inject_mask.py::test_mask_is_noop_when_inject_zero
          | tee gpu-full-st.log
      - name: Guard — fail if the single-threaded step silently skipped
        if: always()
        run: grep -Eq '[0-9]+ passed' gpu-full-st.log && ! grep -Eq '[0-9]{2,} skipped' gpu-full-st.log
